name: Weekly Evaluation (Friday)

on:
  schedule:
    - cron: '0 7 * * 5'   # 毎週金曜 UTC7:00 (JST16:00) 米国市場クローズ後
    - cron: '5 7 * * 5'   # フォールバック
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Evaluate predictions
        run: python scripts/evaluate.py data/predictions.json data/results.json data/history.json

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: 週次評価実行 #${{ github.run_number }}"
          file_pattern: "data/*.json"
